name: Publish Docker image

# Builds and publishes a multi-arch (amd64 + arm64) image to GHCR on:
#   - any v*.*.* tag             -> semver tags (1.0.1, 1.0, 1, latest, sha-*)
#   - every push to main         -> 'main' + 'sha-<short>' (edge, not 'latest')
#   - manual workflow_dispatch   -> same as a main push
#
# Image is signed keyless with cosign via GitHub's OIDC, and ships with
# build provenance + SBOM attestations. Users can verify with:
#
#   cosign verify \
#     --certificate-identity-regexp '^https://github.com/maciekaz/ESET-MCP/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     ghcr.io/maciekaz/eset-mcp:1

on:
  push:
    tags: ['v*.*.*']
    branches: [main]
  release:
    types: [published]    # also fire when a Release is created from an existing tag (UI flow)
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write       # push to GHCR
  id-token: write       # cosign keyless via OIDC
  attestations: write   # SLSA build provenance attestation

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/eset-mcp

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3       # enables arm64 builds on amd64 runner
      - uses: docker/setup-buildx-action@v3     # BuildKit + cache backends

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=ESET-MCP
            org.opencontainers.image.description=MCP server for the ESET ecosystem (Connect cloud + PROTECT On-Prem)
            org.opencontainers.image.licenses=MIT
          annotations: |
            io.modelcontextprotocol.server.name=io.github.maciekaz/eset-mcp

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      # MCP Registry publish - only on v*.*.* tags, not on main pushes.
      # The registry verifies ownership by reading the
      # io.modelcontextprotocol.server.name annotation off the manifest at
      # the identifier in server.json - so this MUST run after the image
      # was pushed (which it is, build-push-action step above completed).
      - name: Install mcp-publisher
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json version with release tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          # Strip the leading 'v' from refs/tags/v1.0.3 -> 1.0.3, then rewrite
          # server.json's version + per-package identifier+version to match.
          V="${VERSION_TAG#v}"
          python3 <<PY
          import json, pathlib
          p = pathlib.Path("server.json")
          d = json.loads(p.read_text())
          d["version"] = "$V"
          for pkg in d.get("packages", []):
              pkg["version"] = "$V"
              ident = pkg.get("identifier", "")
              if ":" in ident:
                  pkg["identifier"] = ident.rsplit(":", 1)[0] + ":$V"
          p.write_text(json.dumps(d, indent=2) + "\n")
          print(p.read_text())
          PY

      - name: Validate server.json against MCP schema
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./mcp-publisher validate ./server.json

      - name: Publish to MCP Registry
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
