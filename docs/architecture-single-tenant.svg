<svg viewBox="0 0 860 252" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

  <rect width="860" height="252" fill="#ffffff" rx="10" stroke="#e1e4e8" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" fill="#1f2328" font-size="13" font-weight="700">MCP Single-Tenant Architecture</text>

  <!-- Column labels -->
  <text x="150" y="45" text-anchor="middle" fill="#8c959f" font-size="8.5" font-weight="600" letter-spacing="0.8">MCP CLIENT</text>
  <text x="405" y="45" text-anchor="middle" fill="#8c959f" font-size="8.5" font-weight="600" letter-spacing="0.8">HUB</text>
  <text x="685" y="45" text-anchor="middle" fill="#8c959f" font-size="8.5" font-weight="600" letter-spacing="0.8">ESET ENDPOINT</text>

  <!-- MCP Client -->
  <rect x="75" y="128" width="150" height="48" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.2"/>
  <text x="150" y="157" text-anchor="middle" fill="#1f2328" font-size="11" font-weight="600">MCP Client</text>

  <!-- ESET-MCP -->
  <rect x="285" y="54" width="240" height="196" rx="8" fill="#f6f8fa" stroke="#0969da" stroke-width="1.5"/>
  <text x="405" y="72" text-anchor="middle" fill="#0969da" font-size="10" font-weight="700">ESET-MCP</text>

  <rect x="299" y="78" width="212" height="46" rx="5" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="405" y="96" text-anchor="middle" fill="#57606a" font-size="9">Auth resolver</text>
  <text x="405" y="110" text-anchor="middle" fill="#1a7f37" font-size="8">Credentials from .env</text>

  <rect x="299" y="134" width="212" height="46" rx="5" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="405" y="152" text-anchor="middle" fill="#57606a" font-size="9">106 tools · RO/RW gate</text>
  <text x="405" y="166" text-anchor="middle" fill="#8c959f" font-size="8">Response shaping</text>

  <rect x="299" y="190" width="212" height="46" rx="5" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="405" y="208" text-anchor="middle" fill="#57606a" font-size="9">Token managers</text>
  <text x="405" y="222" text-anchor="middle" fill="#8c959f" font-size="8">OAuth2 · /GetTokens</text>

  <!-- Single ESET Endpoint -->
  <rect x="585" y="124" width="200" height="56" rx="6" fill="#f6f8fa" stroke="#1a7f37" stroke-width="1.3"/>
  <text x="685" y="143" text-anchor="middle" fill="#1a7f37" font-size="10" font-weight="600">ESET Connect Cloud</text>
  <text x="685" y="157" text-anchor="middle" fill="#57606a" font-size="9">Region set in .env</text>
  <text x="685" y="171" text-anchor="middle" fill="#8c959f" font-size="8">OAuth2 · 102 REST APIs</text>

  <!-- Arrow: MCP Client → ESET-MCP -->
  <line x1="225" y1="152" x2="285" y2="152" stroke="#0969da" stroke-width="1.3" marker-end="url(#ab)"/>
  <text x="255" y="147" text-anchor="middle" fill="#57606a" font-size="7.5">HTTPS / stdio</text>

  <!-- Arrow: ESET-MCP → Endpoint -->
  <line x1="525" y1="152" x2="585" y2="152" stroke="#1a7f37" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="555" y="147" text-anchor="middle" fill="#57606a" font-size="7.5">HTTPS</text>

  <defs>
    <marker id="ab" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#0969da"/>
    </marker>
    <marker id="ag" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L5.5,3 z" fill="#1a7f37"/>
    </marker>
  </defs>
</svg>
